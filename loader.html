<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading - Muhammad Najid Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .loader-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Circuit Board Background */
        .circuit-board {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100, 200, 255, 0.1) 0%, rgba(100, 200, 255, 0) 70%);
            border: 2px solid rgba(100, 200, 255, 0.3);
            animation: rotateBg 20s linear infinite;
        }

        @keyframes rotateBg {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Outer Ring with Dots */
        .ring-outer {
            position: absolute;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #64c8ff;
            border-right-color: #64c8ff;
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Middle Ring */
        .ring-middle {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #00d4ff;
            border-bottom-color: #00d4ff;
            animation: spin-reverse 4s linear infinite;
        }

        @keyframes spin-reverse {
            from {
                transform: rotate(360deg);
            }
            to {
                transform: rotate(0deg);
            }
        }

        /* Inner Ring */
        .ring-inner {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #00ffff;
            border-right-color: #00ffaa;
            animation: spin 2s linear infinite;
        }

        /* Center Badge */
        .center-badge {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, #1a3a52 0%, #0f1f2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #64c8ff;
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.5);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 30px rgba(100, 200, 255, 0.5), inset 0 0 20px rgba(100, 200, 255, 0.2);
            }
            50% {
                box-shadow: 0 0 50px rgba(100, 200, 255, 0.8), inset 0 0 30px rgba(100, 200, 255, 0.4);
            }
        }

        .center-badge > svg {
            width: 60px;
            height: 60px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #64c8ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #64c8ff;
        }

        .particle:nth-child(1) {
            animation: float-particle1 6s infinite;
        }

        .particle:nth-child(2) {
            animation: float-particle2 7s infinite;
            animation-delay: 1s;
        }

        .particle:nth-child(3) {
            animation: float-particle3 8s infinite;
            animation-delay: 2s;
        }

        @keyframes float-particle1 {
            0% {
                left: 50%;
                top: 10%;
                opacity: 0;
            }
            25% {
                opacity: 1;
            }
            75% {
                opacity: 1;
            }
            100% {
                left: 20%;
                top: 80%;
                opacity: 0;
            }
        }

        @keyframes float-particle2 {
            0% {
                right: 10%;
                top: 50%;
                opacity: 0;
            }
            25% {
                opacity: 1;
            }
            75% {
                opacity: 1;
            }
            100% {
                right: 70%;
                top: 20%;
                opacity: 0;
            }
        }

        @keyframes float-particle3 {
            0% {
                left: 10%;
                bottom: 10%;
                opacity: 0;
            }
            25% {
                opacity: 1;
            }
            75% {
                opacity: 1;
            }
            100% {
                left: 80%;
                bottom: 70%;
                opacity: 0;
            }
        }

        /* Loading Text */
        .loading-text {
            position: absolute;
            bottom: -60px;
            font-size: 16px;
            color: #64c8ff;
            letter-spacing: 3px;
            font-weight: 300;
            text-transform: uppercase;
            animation: fadeInOut 2s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        /* Dots Animation */
        .dots {
            display: inline-block;
            margin-left: 5px;
        }

        .dot {
            display: inline-block;
            width: 3px;
            height: 3px;
            background-color: #64c8ff;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            40% {
                opacity: 1;
                transform: translateY(-8px);
            }
        }

        /* Progress Bar */
        .progress-bar {
            position: absolute;
            bottom: -30px;
            width: 150px;
            height: 2px;
            background: rgba(100, 200, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #64c8ff, #00ffff, #64c8ff);
            width: 30%;
            animation: progress 2s ease-in-out infinite;
            border-radius: 10px;
            box-shadow: 0 0 10px #64c8ff;
        }

        @keyframes progress {
            0% {
                width: 0%;
            }
            50% {
                width: 100%;
            }
            100% {
                width: 0%;
            }
        }

        /* Glitch Effect for Extra Flair */
        @keyframes glitch {
            0% {
                clip-path: polygon(0 20%, 100% 20%, 100% 21%, 0 21%);
            }
            2% {
                clip-path: polygon(0 33%, 100% 33%, 100% 33%, 0 33%);
            }
            4% {
                clip-path: polygon(0 44%, 100% 44%, 100% 58%, 0 58%);
            }
            6% {
                clip-path: polygon(0 50%, 100% 50%, 100% 55%, 0 55%);
            }
            8% {
                clip-path: polygon(0 90%, 100% 90%, 100% 99%, 0 98%);
            }
            10% {
                clip-path: polygon(0 10%, 100% 10%, 100% 20%, 0 20%);
            }
            12% {
                clip-path: polygon(0 30%, 100% 30%, 100% 40%, 0 40%);
            }
            100% {
                clip-path: polygon(0 0%, 100% 0%, 100% 100%, 0 100%);
            }
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="circuit-board"></div>
        
        <div class="ring-outer"></div>
        <div class="ring-middle"></div>
        <div class="ring-inner"></div>

        <div class="center-badge">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="chipGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#64c8ff;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <!-- Chip Icon -->
                <rect x="30" y="30" width="40" height="40" fill="none" stroke="url(#chipGradient)" stroke-width="2" rx="3"/>
                <circle cx="40" cy="40" r="2" fill="url(#chipGradient)"/>
                <circle cx="60" cy="40" r="2" fill="url(#chipGradient)"/>
                <circle cx="40" cy="60" r="2" fill="url(#chipGradient)"/>
                <circle cx="60" cy="60" r="2" fill="url(#chipGradient)"/>
                <line x1="35" y1="28" x2="35" y2="20" stroke="url(#chipGradient)" stroke-width="1.5"/>
                <line x1="50" y1="28" x2="50" y2="20" stroke="url(#chipGradient)" stroke-width="1.5"/>
                <line x1="65" y1="28" x2="65" y2="20" stroke="url(#chipGradient)" stroke-width="1.5"/>
                <line x1="35" y1="72" x2="35" y2="80" stroke="url(#chipGradient)" stroke-width="1.5"/>
                <line x1="50" y1="72" x2="50" y2="80" stroke="url(#chipGradient)" stroke-width="1.5"/>
                <line x1="65" y1="72" x2="65" y2="80" stroke="url(#chipGradient)" stroke-width="1.5"/>
            </svg>
        </div>

        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div class="loading-text">
            Loading<span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
        </div>
    </div>
</body>
</html>
